name: Deploy site to GitHub Pages

# Rebuilds site/index.html from content/*.md and publishes it to GitHub Pages.
# TAs only need to edit Markdown in content/ and push — the page rebuilds automatically.

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build site from Markdown
        run: python3 site/build.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site            # index.html lives here -> served at the site root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
