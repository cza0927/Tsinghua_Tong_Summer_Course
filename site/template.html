<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>通用人工智能系统平台I · Course Resources</title>
<style>
  :root{
    --ink:#202124;
    --muted:#5f6368;
    --line:#dadce0;
    --soft:#f8f9fa;
    --accent:#1a73e8;
    --bg:#ffffff;
    --max:1040px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",
      "PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.62;}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  header{border-bottom:1px solid var(--line);background:var(--soft)}
  .header-inner{max-width:var(--max);margin:0 auto;padding:24px 20px 20px}
  h1{margin:0 0 8px;font-size:1.8rem;font-weight:650;letter-spacing:0}
  .subtitle{margin:0;color:var(--muted);font-size:1rem}
  .meta{display:flex;flex-wrap:wrap;gap:12px 18px;margin-top:14px;color:var(--muted);font-size:.92rem}

  nav.tabs{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line)}
  .tabs-inner{max-width:var(--max);margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding:0 20px}
  .tab{appearance:none;border:0;border-bottom:3px solid transparent;background:transparent;
    color:var(--muted);cursor:pointer;font:inherit;font-size:.95rem;font-weight:600;
    padding:12px 14px 10px;white-space:nowrap}
  .tab:hover{color:var(--ink);background:var(--soft)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  main{max-width:var(--max);margin:0 auto;padding:26px 20px 56px}
  .panel{display:none}
  .panel.active{display:block}
  .md{max-width:920px}
  .md h1{font-size:1.65rem;margin:0 0 .75em;padding-bottom:.35em;border-bottom:1px solid var(--line)}
  .md h2{font-size:1.28rem;margin:1.8em 0 .55em;padding-top:.15em}
  .md h3{font-size:1.05rem;margin:1.25em 0 .35em}
  .md p{margin:.65em 0}
  .md blockquote{margin:1em 0;padding:.2em 1em;border-left:3px solid var(--line);color:var(--muted)}
  .md blockquote p{margin:.3em 0}
  .md code{background:var(--soft);border:1px solid #eceff1;padding:.08em .32em;border-radius:4px;
    font-size:.9em;font-family:"SF Mono",Menlo,Consolas,monospace}
  .md pre{background:#f6f8fa;border:1px solid var(--line);padding:13px;overflow:auto}
  .md pre code{background:transparent;border:0;padding:0}
  .md table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.93rem}
  .md th,.md td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  .md th{background:var(--soft);font-weight:650}
  .md ul,.md ol{padding-left:1.35em}
  .md li{margin:.22em 0}
  .md hr{border:0;border-top:1px solid var(--line);margin:1.8em 0}

  footer{max-width:var(--max);margin:0 auto;padding:18px 20px 36px;border-top:1px solid var(--line);
    color:var(--muted);font-size:.86rem}

  @media(max-width:640px){
    .header-inner{padding:20px 16px 16px}
    h1{font-size:1.45rem}
    main{padding:22px 16px 44px}
    .tabs-inner{padding:0 12px}
    .tab{padding:11px 10px 9px}
  }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>通用人工智能系统平台 I</h1>
      <p class="subtitle">General Artificial Intelligence Systems Platform I · Course Resources</p>
      <div class="meta">
        <span>2026年7月13日-7月26日（2周）</span>
        <span>通院2201大教室</span>
        <span>清华通班大一下学生</span>
        <span>课堂讲授 + 编程练习 + 实践报告</span>
      </div>
    </div>
  </header>

  <nav class="tabs"><div class="tabs-inner" id="tabbar"></div></nav>
  <main id="panels"></main>

  <footer>
    <strong>通用人工智能系统平台 I</strong>
    <span id="buildstamp"></span>
  </footer>

  <script src="assets/marked.min.js"></script>
  <script>
    const DOCS = __DOCS__;
    const BUILD_TIME = "__BUILD_TIME__";

    marked.setOptions({ gfm:true, breaks:false, headerIds:true, mangle:false });

    const tabbar = document.getElementById('tabbar');
    const panels = document.getElementById('panels');

    DOCS.forEach((doc, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i===0 ? ' active' : '');
      btn.textContent = doc.label;
      btn.dataset.target = doc.id;
      btn.onclick = () => select(doc.id);
      tabbar.appendChild(btn);

      const panel = document.createElement('section');
      panel.className = 'panel' + (i===0 ? ' active' : '');
      panel.id = doc.id;
      panel.innerHTML = '<div class="md">' + marked.parse(doc.md) + '</div>';
      panels.appendChild(panel);
    });

    function select(id){
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.target===id));
      document.querySelectorAll('.panel').forEach(p =>
        p.classList.toggle('active', p.id===id));
      window.scrollTo({top:0, behavior:'smooth'});
      if (history.replaceState) history.replaceState(null,'','#'+id);
    }

    if (location.hash){
      const id = location.hash.slice(1);
      if (DOCS.some(d => d.id===id)) select(id);
    }
    document.getElementById('buildstamp').textContent =
      BUILD_TIME ? 'Last updated: ' + BUILD_TIME : '';
  </script>
</body>
</html>
